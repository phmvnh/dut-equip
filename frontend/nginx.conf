# ============================================================
# HTTP (cổng 80) — chỉ phục vụ ACME challenge (gia hạn cert) + ép sang HTTPS
# ============================================================
server {
    listen 80;
    listen [::]:80;
    server_name dutequip.io.vn;

    # Để certbot gia hạn chứng chỉ (ACME http-01)
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Mọi request khác chuyển hẳn sang HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

# ============================================================
# HTTPS (cổng 443)
# ============================================================
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name dutequip.io.vn;

    ssl_certificate     /etc/letsencrypt/live/dutequip.io.vn/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/dutequip.io.vn/privkey.pem;

    client_max_body_size 10m;

    # API (Spring Boot phục vụ dưới /api/v1)
    location /api/ {
        proxy_pass http://backend:8080;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # WebSocket / SockJS (chat + thông báo realtime)
    location /ws {
        proxy_pass http://backend:8080;
        proxy_http_version 1.1;
        proxy_set_header Upgrade            $http_upgrade;
        proxy_set_header Connection         "upgrade";
        proxy_set_header Host               $host;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;
        proxy_read_timeout 3600s;
    }

    # SPA React — mọi route khác fallback về index.html
    location / {
        root /usr/share/nginx/html;
        try_files $uri $uri/ /index.html;
    }
}
