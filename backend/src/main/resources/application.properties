spring.application.name=datn-backend
server.port=8080

# Secret thật (DB password, Cloudinary) nằm trong application-local.properties (đã gitignore),
# tự nạp đè qua profile "local". Trên server có thể đặt SPRING_PROFILES_ACTIVE hoặc biến môi trường.
spring.profiles.active=${SPRING_PROFILES_ACTIVE:local}

spring.datasource.url=jdbc:mysql://${DB_HOST:localhost}:${DB_PORT:3306}/${DB_NAME:dut_equip}?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=Asia%2FHo_Chi_Minh
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=false

spring.jpa.properties.hibernate.jdbc.time_zone=Asia/Ho_Chi_Minh
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

jwt.secret=${JWT_SECRET:change-me-please-this-is-a-development-only-secret-256bit}
jwt.expiration=86400000

app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:http://localhost:5173,http://*:5173}

spring.jackson.serialization.write-dates-as-timestamps=false

springdoc.api-docs.path=/v3/api-docs
springdoc.swagger-ui.path=/swagger-ui.html
springdoc.swagger-ui.operationsSorter=method
springdoc.swagger-ui.tagsSorter=alpha

# Upload ảnh qua Cloudinary
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

cloudinary.cloud-name=${CLOUDINARY_CLOUD_NAME:your-cloud-name}
cloudinary.api-key=${CLOUDINARY_API_KEY:your-api-key}
cloudinary.api-secret=${CLOUDINARY_API_SECRET:your-api-secret}
cloudinary.upload-preset=${CLOUDINARY_UPLOAD_PRESET:dut_equip}
cloudinary.folder=${CLOUDINARY_FOLDER:dut_equip/main_image_equipment}
cloudinary.avatar-folder=${CLOUDINARY_AVATAR_FOLDER:dut_equip/avatar}

# AI service (Python FastAPI) — bấm "Phân tích ngay" sẽ POST sang URL này
ai.service.url=${AI_SERVICE_URL:http://localhost:8000}

# Gửi thông báo qua Gmail SMTP (App Password) — secret nằm trong application-local.properties
spring.mail.host=smtp.gmail.com
spring.mail.port=587
spring.mail.username=${MAIL_USERNAME:}
spring.mail.password=${MAIL_PASSWORD:}
spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.starttls.enable=true
spring.mail.properties.mail.smtp.starttls.required=true
spring.mail.properties.mail.smtp.connectiontimeout=5000
spring.mail.properties.mail.smtp.timeout=5000
spring.mail.properties.mail.smtp.writetimeout=5000
app.mail.from=${MAIL_FROM:${spring.mail.username}}
app.mail.enabled=${MAIL_ENABLED:true}

